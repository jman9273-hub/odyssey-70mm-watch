name: odyssey-70mm-watch

on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 min (GitHub may add a few min of drift)
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write             # to commit state.json back

concurrency:
  group: showtime-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          # PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: python monitor.py

      - name: Persist state
        run: |
          git config user.name "showtime-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || (git commit -m "chore: update seen showtimes [skip ci]" && git push)
